<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REXO AI | Universal V4.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffaa; --bg: #020617; }
        body { 
            font-family: 'Outfit', sans-serif; background: var(--bg); color: #f1f5f9;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 80%);
        }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .category-tab.active { background: rgba(0, 255, 170, 0.1); border-right: 3px solid var(--primary); color: var(--primary); }
        
        /* Mobile Scrollbar Hide */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .modal-show { opacity: 1 !important; pointer-events: auto !important; transform: scale(1) !important; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="h-16 md:h-20 border-b border-white/5 flex items-center justify-between px-4 md:px-10 glass z-50 flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 md:w-10 md:h-10 bg-emerald-500 rounded-lg flex items-center justify-center font-black text-black">R</div>
            <span class="font-black text-lg md:text-xl tracking-tighter uppercase">REXO <span class="text-emerald-400 font-light">CORE</span></span>
        </div>
        <div class="px-4 py-1.5 bg-emerald-500/5 rounded-full border border-emerald-500/10 text-[10px] font-black text-emerald-400">
            SAVED: <span id="count-saved">0</span>
        </div>
    </nav>

    <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <aside class="w-full md:w-72 border-b md:border-r border-white/5 bg-slate-950/30 p-4 md:p-8 flex flex-col gap-6 overflow-y-auto no-scrollbar flex-shrink-0">
            
            <div class="space-y-1">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Navigation</h3>
                <button onclick="filter('all')" class="category-tab active w-full flex items-center p-3 rounded-xl text-xs font-bold transition-all">🏠 All Streams</button>
                <button onclick="filter('scholarship')" class="category-tab w-full flex items-center p-3 rounded-xl text-xs font-bold text-slate-400">🎓 Scholarships</button>
                <button onclick="filter('internship')" class="category-tab w-full flex items-center p-3 rounded-xl text-xs font-bold text-slate-400">💼 Internships</button>
                <button onclick="filter('spam')" class="category-tab w-full flex items-center p-3 rounded-xl text-xs font-bold text-slate-400">🚫 Spams</button>
                <button onclick="filter('saved')" class="category-tab w-full flex items-center p-3 rounded-xl text-xs font-bold text-slate-400">⭐ Saved Vault</button>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Neural Settings</h3>
                <div>
                    <label class="text-[9px] font-bold text-slate-600 uppercase mb-2 block">Major Field</label>
                    <input type="text" id="p-major" placeholder="e.g. CS / Engineering" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-emerald-400 outline-none focus:border-emerald-500/50">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-600 uppercase mb-2 block">Target Skills</label>
                    <textarea id="p-skills" rows="3" placeholder="React, Python, AI..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-slate-300 outline-none resize-none focus:border-emerald-500/50"></textarea>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-10">
            <div class="max-w-4xl mx-auto space-y-8">
                
                <div class="glass rounded-[2.5rem] border border-white/10 p-2 shadow-2xl">
                    <textarea id="input-feed" rows="4" class="w-full bg-transparent p-5 text-sm mono text-emerald-100/60 outline-none resize-none" placeholder="Drop email data packets here..."></textarea>
                    <div class="p-2">
                        <button onclick="launchNeuralScan()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-black py-4 rounded-2xl font-black text-xs uppercase tracking-widest transition-all active:scale-95 shadow-xl shadow-emerald-500/20">Execute Neural Analysis</button>
                    </div>
                </div>

                <div id="results-grid" class="space-y-4 pb-20">
                    <div class="text-center py-20 opacity-20">
                        <p class="text-xs font-black tracking-[0.3em] uppercase">Engine Standby</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="action-modal" class="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6 bg-black/90 backdrop-blur-xl opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass w-full max-w-xl rounded-t-[2.5rem] md:rounded-[3rem] border-t md:border border-white/10 overflow-hidden shadow-2xl translate-y-full md:translate-y-0 md:scale-95 transition-transform duration-300" id="modal-content">
            <div class="p-8 md:p-10">
                <div class="flex justify-between items-center mb-6">
                    <span id="m-type" class="text-[10px] font-black px-3 py-1 bg-emerald-500/10 text-emerald-400 rounded-full uppercase tracking-widest"></span>
                    <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/5 text-white">&times;</button>
                </div>
                <h2 id="m-title" class="text-2xl font-black text-white mb-6 leading-tight"></h2>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Neural Match</p>
                        <p id="m-score" class="text-2xl font-black text-emerald-400">0%</p>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                        <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Status</p>
                        <p class="text-[10px] text-white uppercase font-bold">Verified</p>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <button id="m-primary-btn" class="w-full bg-emerald-400 text-black py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Open Link</button>
                    <button id="m-save-btn" class="w-full bg-white/5 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest border border-white/10">Vault Item</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let datastream = [];
        let savedItems = JSON.parse(localStorage.getItem('rexoSaved')) || [];
        let currentFilter = 'all';

        function launchNeuralScan() {
            const raw = document.getElementById('input-feed').value;
            const major = document.getElementById('p-major').value.toLowerCase().trim();
            const skills = document.getElementById('p-skills').value.toLowerCase().split(',').map(s => s.trim()).filter(s => s);
            
            if(!raw.trim()) return;

            const blocks = raw.split(/(?=Subject:)|(?=From:)|(?=\n\d{1,2}\.)/gi).filter(b => b.trim().length > 15);
            
            datastream = blocks.map((text, idx) => {
                const lowerText = text.toLowerCase();
                let type = 'neutral';
                
                if(lowerText.includes('scholarship') || lowerText.includes('fellowship')) type = 'scholarship';
                else if(lowerText.includes('internship') || lowerText.includes('hiring') || lowerText.includes('job')) type = 'internship';
                else if(lowerText.includes('unsubscribe') || lowerText.includes('lottery') || lowerText.includes('winner')) type = 'spam';

                const subject = text.match(/Subject:\s*(.*)/i)?.[1] || "Packet Analysis " + (idx + 1);
                const link = text.match(/(https?:\/\/[^\s]+)/g)?.[0] || null;
                
                let score = 20; 
                if(type !== 'neutral' && type !== 'spam') {
                    score += 20;
                    skills.forEach(s => { if(lowerText.includes(s)) score += 20; });
                    if(major && lowerText.includes(major)) score += 20;
                }

                return { id: Date.now() + idx, type, subject: subject.substring(0, 60), preview: text.substring(0, 100), score: Math.min(score, 100), link };
            });
            renderGrid();
        }

        function filter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.category-tab').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(cat) || (cat === 'all' && btn.innerText.includes('All')));
            });
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('results-grid');
            const list = (currentFilter === 'saved') ? savedItems : datastream;
            const filtered = list.filter(item => currentFilter === 'all' || currentFilter === 'saved' || item.type === currentFilter);
            
            container.innerHTML = filtered.length ? filtered.map(item => `
                <div class="glass p-6 md:p-8 rounded-[2rem] border-l-8 ${getTypeColor(item.type)} flex justify-between items-center gap-4 hover:bg-white/[0.04] transition-all group">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] font-black uppercase opacity-40">${item.type}</span>
                            ${savedItems.some(s => s.id === item.id) ? '<span class="text-emerald-400 text-[9px]">★</span>' : ''}
                        </div>
                        <h4 class="text-white font-bold text-base md:text-lg truncate group-hover:text-emerald-400 transition-colors">${item.subject}</h4>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right hidden md:block">
                            <p class="text-white font-black text-lg">${item.score}%</p>
                        </div>
                        <button onclick="openAction(${item.id})" class="bg-white/5 hover:bg-emerald-500 hover:text-black text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase transition-all">View</button>
                    </div>
                </div>
            `).join('') : `<div class="text-center py-20 opacity-20 text-xs font-black uppercase">No Data in ${currentFilter}</div>`;
            
            document.getElementById('count-saved').innerText = savedItems.length;
        }

        function getTypeColor(type) {
            if(type === 'scholarship') return 'border-purple-500';
            if(type === 'internship') return 'border-emerald-500';
            if(type === 'spam') return 'border-red-500';
            return 'border-blue-500';
        }

        function openAction(id) {
            const item = datastream.find(d => d.id == id) || savedItems.find(d => d.id == id);
            document.getElementById('m-title').innerText = item.subject;
            document.getElementById('m-type').innerText = item.type;
            document.getElementById('m-score').innerText = item.score + '%';
            
            const sBtn = document.getElementById('m-save-btn');
            sBtn.onclick = () => toggleSave(item.id);
            sBtn.innerText = savedItems.some(s => s.id == item.id) ? "Remove from Vault" : "Save to Vault";
            
            const pBtn = document.getElementById('m-primary-btn');
            if(item.link) { pBtn.onclick = () => window.open(item.link); pBtn.style.display = 'block'; }
            else { pBtn.style.display = 'none'; }

            document.getElementById('action-modal').classList.add('modal-show');
            document.getElementById('modal-content').style.transform = "translateY(0) scale(1)";
        }

        function toggleSave(id) {
            const item = datastream.find(d => d.id == id) || savedItems.find(d => d.id == id);
            const idx = savedItems.findIndex(s => s.id == id);
            if(idx === -1) savedItems.push(item); else savedItems.splice(idx, 1);
            localStorage.setItem('rexoSaved', JSON.stringify(savedItems));
            renderGrid();
            closeModal();
        }

        function closeModal() {
            document.getElementById('action-modal').classList.remove('modal-show');
            document.getElementById('modal-content').style.transform = "translateY(100%)";
        }
    </script>
</body>
</html>
